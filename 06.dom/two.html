<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning</title>
</head>
<body style="background-color: #121212; color : #ffff;  " >
    <div class="parents">
        <!-- this is a comment -->
        <div class="days">Monday</div>
        <div class="days">Tuseday</div>
        <div class="days">Wednesday</div>
        <div class="days">Thrusday</div>
    </div>
</body>
<script>
const parent = document.querySelector('.parents')
//console.log(parent);

//console.log(parent.children);
//The children property returns a collection of an element's child elements.
//The children property returns an HTMLCollection object.

//console.log(parent.children[1].innerHTML);

// apply basic for loop 
for (let i= 0; i < parent.children.length; i++) {
    console.log(parent.children[i].innerHTML);
}

parent.children[1].style.color = "orange"

// we have some other properties like children
//firstElementChild return the first value of the parent div  
//console.log(parent.firstElementChild);

// similarly lastElementChild retuen last value of the parent div
//console.log(parent.lastElementChild);


//it is also method to print the first value 
// but we use querySelector method 
// it takes huge amount of time because dom is a tree like structure so it traverse the every single root 
const dayONE = document.querySelector('.days')
console.log(dayONE);

// now if we go to back parent node we simply use this 
console.log(dayONE.parentElement);
console.log(dayONE.nextElementSibling);

console.log("nodes : " , parent.childNodes);
// childNodes property show how many nodeList we have 
// it calculate all line with single line break
// it takes only single line break as a nodeList 
// it also takes comment in nodeList
// 









</script>
</html>
