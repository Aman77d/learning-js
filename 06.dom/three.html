<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new element creation in DOM</title>
</head>
<body style="background-color: #121212; color : #fff ;">
    
</body>
<script>
    
    const div = document.createElement('div')
    // this is a method to create a elemrnt in javaScript
    console.log(div);

    // we can set a class name by this method
    div.className = "main"

    div.id = "style"
    //div.id = Math.round(Math.random() * 10 + 1)

    div.setAttribute("title" , "text genration ")
    div.style.backgroundColor = "green"
    div.style.padding = "10px"

    //div.innerText = "create new element "

    // this is textNode it help to optimize the browser 
   const addText = document.createTextNode("Create new  element ")
   div.appendChild(addText)

   document.body.appendChild(div)
   // this is a method to display all the created element 


</script>
</html>
